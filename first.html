<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的网页</title>
  <style>
    body {
      text-align: center;
      background: lightblue;
      padding-top: 100px;
    }
    h1 {
      color: green;
    }
    a {
      font-size: 18px;
      color: darkblue;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Hi,你好呀</h1>
  <h2>现在是：<span id="now-time"></span></h2>
  <p>5月22日，我的第一个网页文件成功运行了</p>
  <p>5月23日，我对ta（当前网页）进行了页面、文字的优化，并使用GITHUB进行网址上线，也使代码更标准</p>

  <!-- 超链接：访问我的主页 -->
  <a href="https://github.com/sun-yc13">访问我的主页</a>

  <!-- 动态时间脚本 -->
  <script>
    function showTime() {
      let now = new Date();
      document.getElementById("time").innerText = now.toLocaleString();
    }
    showTime();
    setInterval(showTime, 1000);
  </script>

</body>
</html>
